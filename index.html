<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Supergravity — Atlas of Everything</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="styles-v2.css"/>
  <link rel="stylesheet" href="styles-v3.css"/>
  <link rel="stylesheet" href="styles-responsive.css"/>
  <link rel="stylesheet" href="styles-auth.css"/>
  <link rel="stylesheet" href="styles-workshop.css"/>
  <link rel="stylesheet" href="styles-chapters.css"/>
  <link rel="stylesheet" href="styles-media.css"/>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 production builds — no devtools overhead, ~180KB vs 1.1MB dev -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script src="lessons.js"></script>
  <script src="lessons-hero.js"></script>

  <!-- Content bundle (≈ 3.7MB, one HTTP request).
       Build with: ./tools/build-content-bundle.sh
       Dev mode: comment this line, uncomment your subject file + _bootstrap.js below. -->
  <script src="content/_bundle.js"></script>
  <!-- <script src="content/<subject-id>.js"></script> -->
  <!-- <script src="content/_bootstrap.js"></script> -->

  <!-- Wikipedia + Wikimedia Commons enrichment data.
       Generated by: npm run enrich  (requires ANTHROPIC_API_KEY)
       Adds images, wonder hooks, truth scores, and Wikipedia links to all lessons. -->
  <script src="content/_enrichment.js"></script>

  <script src="tutor-api.js"></script>

  <!-- Compiled app bundle — all JSX pre-compiled, no Babel needed.
       Build with: npm run build  (requires Node + esbuild, run once after changes)
       Dev fallback: if dist/sg-app.js is absent, reload with ?babel=1 to use Babel inline. -->
  <script>
    (function() {
      var compiled = document.createElement('script');
      compiled.src = 'dist/sg-app.js';
      compiled.onerror = function() {
        // dist/sg-app.js not found (local dev without a build) — load Babel fallback
        if (!location.search.includes('babel=1')) {
          location.replace(location.href + (location.search ? '&babel=1' : '?babel=1'));
        }
      };
      document.currentScript.parentNode.appendChild(compiled);
    })();
  </script>

  <!-- Babel fallback: only loaded when ?babel=1 is in the URL.
       This allows local development without running npm run build first. -->
  <script>
    if (location.search.includes('babel=1')) {
      document.write('<scr'+'ipt src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></scr'+'ipt>');
    }
  </script>
  <script>
    if (location.search.includes('babel=1')) {
      var babelScripts = [
        'components.jsx','interactives.jsx','interactives-v2.jsx',
        'content/_interactives-bundle.jsx','content/b04-enhance.js',
        'tutor.jsx','tutor-v2.jsx','extras.jsx','extras2.jsx','pages.jsx',
        'pages-v2.jsx','hero-visual.jsx','atlas-v3.jsx','auth.jsx',
        'home.jsx','workshop.jsx','path.jsx','rule.jsx','chapters.jsx',
        'health.jsx','app.jsx'
      ];
      // Inject as text/babel tags so Babel transforms them
      babelScripts.forEach(function(src) {
        document.write('<scr'+'ipt type="text/babel" src="'+src+'"></scr'+'ipt>');
      });
    }
  </script>
</body>
</html>
