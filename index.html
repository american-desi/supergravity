<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Supergravity — Atlas of Everything</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="styles-v2.css"/>
  <link rel="stylesheet" href="styles-v3.css"/>
  <link rel="stylesheet" href="styles-responsive.css"/>
  <link rel="stylesheet" href="styles-auth.css"/>
  <link rel="stylesheet" href="styles-workshop.css"/>
  <link rel="stylesheet" href="styles-chapters.css"/>
  <link rel="stylesheet" href="styles-media.css"/>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script src="lessons.js"></script>
  <script src="lessons-hero.js"></script>

  <!-- ===== Supergravity content =====
       Production: one bundle ≈ 3.7MB, one HTTP request.
       Build it with:  ./tools/build-content-bundle.sh
       The bundle concatenates every content/*.js subject file and appends
       content/_bootstrap.js at the end.

       Dev mode (live-editing a specific subject without rebuilding):
       comment out the bundle line below and append:
         <script src="content/<subject-id>.js"></script>
         <script src="content/_bootstrap.js"></script>
       Keep the bundle line commented in so any batch session that rebuilds
       after you're done doesn't silently drop your subject.
  -->
  <script src="content/_bundle.js"></script>

  <script src="tutor-api.js"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="interactives.jsx"></script>
  <script type="text/babel" src="interactives-v2.jsx"></script>

  <!-- All batch-specific interactive registries, bundled. Regenerate with
       ./tools/build-content-bundle.sh after editing any of the source files:
       content/math-interactives.jsx, content/interactives-b02.jsx,
       content/interactives-b03.jsx, content/interactives-b03-rich.jsx,
       content/interactives-b04.jsx -->
  <script type="text/babel" src="content/_interactives-bundle.jsx"></script>

  <!-- B04 post-bootstrap enhancement: splices inline interactives / images
       into key lesson bodies. Must run AFTER all interactive registries. -->
  <script type="text/babel" src="content/b04-enhance.js"></script>
  <script type="text/babel" src="tutor.jsx"></script>
  <script type="text/babel" src="tutor-v2.jsx"></script>
  <script type="text/babel" src="extras.jsx"></script>
  <script type="text/babel" src="extras2.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>
  <script type="text/babel" src="pages-v2.jsx"></script>
  <script type="text/babel" src="hero-visual.jsx"></script>
  <script type="text/babel" src="atlas-v3.jsx"></script>
  <script type="text/babel" src="auth.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="workshop.jsx"></script>
  <script type="text/babel" src="path.jsx"></script>
  <script type="text/babel" src="rule.jsx"></script>
  <script type="text/babel" src="chapters.jsx"></script>
  <script type="text/babel" src="health.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
