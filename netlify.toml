[build]
  command   = "npm run build --if-present"
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# SPA routing — serve index.html for all non-asset paths
[[redirects]]
  from   = "/api/chat"
  to     = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
  conditions = {Role = ["exclude-assets"]}

# Don't rewrite actual files/assets
[[redirects]]
  from    = "/dist/*"
  to      = "/dist/:splat"
  status  = 200
  force   = false

[[redirects]]
  from    = "/content/*"
  to      = "/content/:splat"
  status  = 200
  force   = false

[[redirects]]
  from    = "/*.css"
  to      = "/:splat.css"
  status  = 200
  force   = false

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/dist/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/content/_bundle.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"
